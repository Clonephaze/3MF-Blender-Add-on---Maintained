title: "[Bug] "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Found something broken? Fill this out with as much detail as possible.
        If you're not sure it's a bug, post in [Support / Troubleshooting](../../discussions/new?category=support) first.

  - type: input
    id: addon-version
    attributes:
      label: Addon Version
      description: Found in Edit → Preferences → Add-ons → 3MF Format
      placeholder: "e.g. 2.0.0"
    validations:
      required: true

  - type: input
    id: blender-version
    attributes:
      label: Blender Version
      placeholder: "e.g. 5.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Windows 11, macOS 14, Ubuntu 24.04"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area does this relate to?
      options:
        - Import
        - Export — Standard
        - Export — Orca / BambuStudio
        - Export — PrusaSlicer
        - Multi-Material Paint
        - UI / Preferences
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what went wrong. Paste any error output from Window → Toggle System Console.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a .3mf file with '...'
        2. Export with settings '...'
        3. Open the result in OrcaSlicer
        4. See '...'
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, your .3mf file, or anything else that might help.
    validations:
      required: false
